teacher_model:
  model_name_or_path: checkpoints/local-a5500-smoke/model
  use_openrouter: false
  vllm:
    temperature: 0.6
    max_length: 2048
    max_num_seqs: 8
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 1
    max_number_of_instances: 1
    load_and_unload: true
    use_v0: true
    enforce_eager: true

student_model:
  model_name_or_path: Qwen/Qwen2.5-0.5B-Instruct
  vllm:
    temperature: 0.6
    max_length: 2048
    max_num_seqs: 8
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 1
    max_number_of_instances: 1
    load_and_unload: true
    use_v0: false

judge_model:
  model_name_or_path: Qwen/Qwen2.5-1.5B-Instruct
  vllm:
    temperature: 0.2
    max_length: 2048
    max_num_seqs: 8
    gpu_memory_utilization: 0.36
    number_of_gpus_per_instance: 1
    max_number_of_instances: 1
    load_and_unload: true
    use_v0: false
    enforce_eager: true

reward_model:
  model_name_or_path: Answer

dataset:
  eval_datasets:
    - name_or_path: rd211/Big-Math-RL-Verified-Filtered
      split: test
      ratio: 1.0
  max_val_examples: 2

logging:
  wandb: false
  wandb_project: eval
  wandb_run_name: local-a5500-smoke
  run_group: smoke
  wandb_tags: ["smoke", "a5500", "0.5b"]

generation:
  forced_conversation_type: guided
  max_turns: 4
  max_tokens_in_conversation: 768
  max_tokens_per_turn: 96
  max_tokens_per_student_attempt: 192
  max_tokens_per_judge_attempt: 384
  number_student_attempts: 2
  number_judge_attempts: 1
  ignore_rejected_judge: true
  extra_penalty_for_rejected_judges: 0.25
  use_thinking: false
  force_thinking: false
  tokenizer_to_use: Qwen/Qwen2.5-0.5B-Instruct

num_samples_per_problem: 1
score_using_pedagogical_reward: false
recompute_initial_attempts: true
export_conversations_path: reports/local_a5500_smoke_eval_conversations.json
export_metrics_path: reports/local_a5500_smoke_eval_metrics.json
