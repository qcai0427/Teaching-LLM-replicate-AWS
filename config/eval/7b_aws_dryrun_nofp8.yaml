teacher_model:
  model_name_or_path: Qwen/Qwen2.5-7B-Instruct
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 64
    max_length: 4096
    load_and_unload: true
    use_v0: true
    enforce_eager: true

student_model:
  model_name_or_path: meta-llama/Llama-3.1-8B-Instruct
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 64
    max_length: 4096
    load_and_unload: true
    use_v0: false

judge_model:
  model_name_or_path: Qwen/Qwen2.5-14B-Instruct-AWQ
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 64
    max_length: 4096
    load_and_unload: false
    use_v0: false

reward_model:
  model_name_or_path: Answer

dataset:
  eval_datasets:
    - name_or_path: rd211/Big-Math-RL-Verified-Filtered
      split: train
      ratio: 1.0
  max_eval_examples: 4

generation:
  max_turns: 4
  max_tokens_in_conversation: 4096
  max_tokens_per_turn: 256
  max_tokens_per_student_attempt: 512
  max_tokens_per_judge_attempt: 512
  number_student_attempts: 2
  number_judge_attempts: 1

logging:
  wandb: false
  run_name: 7b-aws-dryrun-nofp8-eval

export_conversations_path: reports/aws_dryrun_nofp8_eval_conversations.json
export_metrics_path: reports/aws_dryrun_nofp8_eval_metrics.json
