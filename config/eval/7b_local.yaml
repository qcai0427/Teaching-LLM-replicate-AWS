teacher_model:
  model_name_or_path: checkpoints/7b/model
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 128
    max_length: 12000
    load_and_unload: true
    use_v0: true
    enforce_eager: true

student_model:
  model_name_or_path: neuralmagic/Meta-Llama-3.1-8B-Instruct-FP8
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 128
    max_length: 12000
    load_and_unload: true
    use_v0: false

judge_model:
  model_name_or_path: Qwen/Qwen2.5-14B-Instruct-AWQ
  vllm:
    gpu_memory_utilization: 0.30
    number_of_gpus_per_instance: 4
    max_number_of_instances: 1
    max_num_seqs: 128
    max_length: 12000
    load_and_unload: false
    use_v0: false

reward_model:
  model_name_or_path: Answer

dataset:
  eval_datasets:
    - name_or_path: rd211/Big-Math-RL-Verified-Filtered
      split: train
      ratio: 1.0
  max_val_examples: 64

generation:
  max_turns: 15
  max_tokens_in_conversation: 12000
  max_tokens_per_turn: 1024
  max_tokens_per_student_attempt: 3900
  max_tokens_per_judge_attempt: 2048
  number_student_attempts: 8
  number_judge_attempts: 2
  ignore_rejected_judge: false

logging:
  wandb: false
  wandb_project: eval
  wandb_run_name: 7b-local-eval
  run_group: 7b
  wandb_tags: ["7b", "local-eval"]

export_conversations_path: reports/7b_eval_conversations.json
export_metrics_path: reports/7b_eval_metrics.json
